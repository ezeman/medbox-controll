services:
  db:
    image: postgres:16
    container_name: medbot-db
    environment:
      POSTGRES_DB: medbot
      POSTGRES_USER: medbot
      POSTGRES_PASSWORD: medbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: medbot-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://medbot:medbot@db:5432/medbot
      ROBOT_API_URL: ""
      RELAY_API_URL: ""
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    container_name: medbot-web
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
